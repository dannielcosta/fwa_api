services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fwa
      POSTGRES_PASSWORD: fwa
      POSTGRES_DB: fwa_dev
    ports:
      # 5433 no host — a 5432 já está ocupada por um Postgres local (ver README).
      - '5433:5432'
    volumes:
      - fwa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fwa -d fwa_dev']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fwa_postgres_data:
